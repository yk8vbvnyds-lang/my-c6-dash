<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C6 Custom Dash</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .metric-container { text-align: center; margin: 20px; }
        .label { font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; color: #888888; }
        .value { font-size: 6rem; font-weight: bold; color: #00ffcc; line-height: 1; }
        button {
            background-color: #00ffcc; color: #121212; border: none; padding: 15px 40px;
            font-size: 1.2rem; font-weight: bold; border-radius: 30px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 255, 204, 0.3);
        }
        #status { margin-top: 15px; color: #666; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div id="ui-connect">
        <button id="connect-btn" onclick="connectC6Bike()">CONNECT C6 BIKE</button>
        <div id="status">Checking for previously paired bike...</div>
    </div>

    <div id="ui-dash" style="display: none;">
        <div class="metric-container">
            <div class="label">Cadence</div>
            <div id="cadence-val" class="value">0</div>
            <div class="label" style="font-size: 1rem; margin-top:5px;">RPM</div>
        </div>
    </div>

<script>
let lastCrankRevolutions = 0;
let lastCrankEventTime = 0;
let bikeDevice = null;

// Automatically run when the page loads
window.addEventListener('DOMContentLoaded', async () => {
    const statusDiv = document.getElementById('status');
    
    // Check if the browser supports remembering devices
    if (navigator.bluetooth.getDevices) {
        const devices = await navigator.bluetooth.getDevices();
        // If we found a previously paired C6 bike, try to auto-connect instantly
        if (devices.length > 0) {
            statusDiv.innerText = "Found paired bike! Auto-connecting...";
            bikeDevice = devices[0];
            setupBluetoothConnection(bikeDevice);
        } else {
            statusDiv.innerText = "No paired bike found. Tap button to pair first time.";
        }
    } else {
        statusDiv.innerText = "Ready to pair.";
    }
});

async function connectC6Bike() {
    try {
        // First-time manual pairing request
        bikeDevice = await navigator.bluetooth.requestDevice({
          filters: [{ services: ['cycling_speed_and_cadence'] }],
          optionalServices: ['cycling_speed_and_cadence'] // needed for persistent permissions
        });
        setupBluetoothConnection(bikeDevice);
    } catch (error) {
        document.getElementById('status').innerText = `Error: ${error.message}`;
    }
}

async function setupBluetoothConnection(device) {
    const statusDiv = document.getElementById('status');
    try {
        // Listen for accidental disconnections so it can re-connect automatically mid-ride
        device.addEventListener('gattserverdisconnected', onDisconnected);
        
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService('cycling_speed_and_cadence');
        const characteristic = await service.getCharacteristic('csc_measurement');
        
        await characteristic.startNotifications();
        characteristic.addEventListener('characteristicvaluechanged', parseC6Data);
        
        // Switch to the live workout view
        document.getElementById('ui-connect').style.display = 'none';
        document.getElementById('ui-dash').style.display = 'block';
    } catch (error) {
        statusDiv.innerText = "Connection failed. Retrying in 3 seconds...";
        setTimeout(() => setupBluetoothConnection(device), 3000);
    }
}

function onDisconnected(event) {
    // If the bike drops connection, reset UI and look for it again automatically
    document.getElementById('ui-connect').style.display = 'block';
    document.getElementById('ui-dash').style.display = 'none';
    document.getElementById('status').innerText = "Bike disconnected. Reconnecting...";
    setupBluetoothConnection(event.target);
}

function parseC6Data(event) {
    const data = event.target.value;
    let byteOffset = 0;
    
    const flags = data.getUint8(byteOffset);
    byteOffset += 1;
    
    const hasWheelData = (flags & 0x01) !== 0;
    const hasCrankData = (flags & 0x02) !== 0;
    
    if (hasWheelData) { byteOffset += 6; } // Skip wheel data safely
    
    if (hasCrankData) {
        const crankRevolutions = data.getUint16(byteOffset, true);
        byteOffset += 2;
        const crankEventTime = data.getUint16(byteOffset, true);
        byteOffset += 2;
        
        if (lastCrankEventTime > 0 && crankEventTime !== lastCrankEventTime) {
            let revsDelta = crankRevolutions - lastCrankRevolutions;
            let timeDelta = crankEventTime - lastCrankEventTime;
            
            if (revsDelta < 0) revsDelta += 65536;
            if (timeDelta < 0) timeDelta += 65536;
            
            const minutesDelta = (timeDelta / 1024) / 60;
            const currentRPM = Math.round(revsDelta / minutesDelta);
            
            if (currentRPM >= 0 && currentRPM < 250) {
                document.getElementById('cadence-val').innerText = currentRPM;
            }
        }
        lastCrankRevolutions = crankRevolutions;
        lastCrankEventTime = crankEventTime;
    }
}
</script>
</body>
</html>
